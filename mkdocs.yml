site_name: FL-ModKit
site_description: Unofficial MelonLoader/Harmony SDK for building Flashing Lights mods.
site_url: https://babyhamsta.github.io/FL-ModKit/
repo_name: Babyhamsta/FL-ModKit
repo_url: https://github.com/Babyhamsta/FL-ModKit
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - getting-started.md
      - building-first-mod.md
      - project-layout.md
  - Guides:
      - lifecycle.md
      - config.md
      - ui.md
      - patching.md
      - discovery.md
      - cookbook.md
  - Reference:
      - api-reference.md
      - sdk-versioning.md
  - Operations:
      - debugging.md
      - troubleshooting.md
      - packaging.md
      - contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - sane_lists
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
